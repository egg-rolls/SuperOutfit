# SuperOutfit 衣物模板
# 复制此文件并重命名为 item_NNN.yaml，然后填写信息

id: item_000                      # 唯一 ID，格式 item_NNN
type: ""                          # 上衣 | 下装 | 外套 | 鞋子 | 配饰
sub_type: ""                      # ≤10字：T恤 | 衬衫 | 牛仔裤 | 西装裤 | 运动鞋 | ...

# 外观
colors:
  primary: ""                     # ≤5字：主色名称（必须填）
  primary_hex: ""                 # 主色 HEX 色值，如 #F5F0E8
  secondary: ""                   # ≤5字：副色/花纹名称（可选）
  secondary_hex: ""               # 副色 HEX 色值
  tertiary: ""                    # 第三色（可选，如拼色设计）
  tertiary_hex: ""                # 第三色 HEX 色值
  pattern: "纯色"                 # 纯色 | 条纹 | 格子 | 印花 | 扎染

material: ""                      # 纯棉 | 涤纶 | 羊毛 | 真丝 | 牛仔 | 皮革 | ...
fit: "常规"                       # 紧身 | 修身 | 常规 | 宽松 | oversize

# 尺寸
size: ""                          # S | M | L | XL | ...
brand: ""                         # 品牌
price: 0                          # 购买价格（元）
purchase_date: ""                 # 购买日期 YYYY-MM-DD

# 状态
condition: "完好"                 # 完好 | 轻微磨损 | 需修补 | 待处理

# 搭配属性
style: []                         # 风格标签：通勤/简约/轻熟/运动/街头/...
season: []                        # 适合季节：春/夏/秋/冬
temperature_range: "0~40"         # 适穿温度范围（℃）
occasion: []                      # 适合场合：办公/日常/约会/运动/...
layer: "可单穿"                   # 内层 | 中间层 | 外层 | 可单穿

# 详细规格
neckline: ""                      # 领型
sleeve: ""                        # 袖长：短袖/长袖/无袖
length: ""                        # 衣长/裤长
closure: ""                       # 闭合方式：纽扣/拉链/套头/系带

# 搭配规则
pair_with:                        # 推荐搭配（参考用）
  - type: ""
    sub_type: ""
    color: ""

restrict:                         # 搭配禁忌
  - ""

# 标记
favorite: false
tags: []                          # 自定义标签

# 图片（文件名，实际图片放在 ../images/ 目录）
image: ""                         # 如 item_001.jpg

# 穿着管理（自动维护，无需手动填写）
wear_count: 0                     # 穿着次数
last_worn: ""                     # 最后穿着日期 YYYY-MM-DD
wear_dates: []                    # 每次穿着日期记录
wash_frequency: 1                 # 建议穿几次后洗（外衣类可设 3-5）
wash_count: 0                     # 上次清洗时的穿着次数
last_washed: ""                   # 上次清洗日期 YYYY-MM-DD
needs_wash: false                 # 是否需要清洗（自动计算）

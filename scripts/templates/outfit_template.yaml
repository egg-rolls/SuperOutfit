# SuperOutfit 搭配方案模板

id: outfit_000                    # 唯一 ID，格式 outfit_NNN
name: ""                          # 搭配名称，如"清爽通勤装"

# 包含的衣物
items:
  - item_001                      # 上衣
  - item_020                      # 裤子
  - item_040                      # 鞋子
  # - item_030                   # 外套（可选）

# 适用场景
occasion: ""                      # 办公 | 日常 | 约会 | 运动 | ...
season: []                        # 适合季节

# AI 评分
score: 0                          # 综合评分 (0-100)
scores:                           # 分项评分
  color: 0                        # 颜色协调
  style: 0                        # 风格一致
  occasion: 0                     # 场合匹配
  weather: 0                      # 天气适配
  freshness: 0                    # 新鲜度

# 搭配理由
reason: ""

# 创建时的天气
weather:
  temperature: 0
  condition: ""
  city: ""

# 元数据
created_at: ""                    # ISO datetime
worn_count: 0                     # 被采纳穿着的次数
rating: 0                         # 用户手动评分 (1-5)
notes: ""                         # 用户备注
